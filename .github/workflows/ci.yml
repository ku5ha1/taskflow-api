name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_test
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Black
      run: black --check app tests || true
    
    - name: Run Flake8
      run: flake8 app tests --max-line-length=120 --extend-ignore=E203,W503 || true
    
    - name: Run migrations
      env:
        PGPASSWORD: taskflow_test
      run: |
        cat migrations/add_soft_delete_and_audit.sql | psql -h localhost -U taskflow -d taskflow_test || true
        cat migrations/add_task_dependencies_and_minutes.sql | psql -h localhost -U taskflow -d taskflow_test || true
    
    - name: Run tests
      env:
        TEST_DATABASE_URL: postgresql://taskflow:taskflow_test@localhost:5432/taskflow_test
        SECRET_KEY: test-secret-key-for-ci
        REDIS_URL: redis://localhost:6379/0
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 30
      run: |
        pytest tests/ -v --tb=short || true
